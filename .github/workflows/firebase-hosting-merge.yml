# Al hacer push a main: compila y publica la web (Firebase Hosting) y el
# APK de Android (release firmado, subido como GitHub Release "latest"),
# todo automático — no hace falta correr nada a mano.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # --- Android: preparar la llave de firma y compilar el APK ---
      - name: Preparar llave de firma
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Compilar APK
        run: >
          flutter build apk --release
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Publicar APK como release de GitHub (siempre "latest")
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Última versión"
          prerelease: false
          make_latest: true
          files: frontend/build/app/outputs/flutter-apk/app-release.apk

      # --- Web: compilar y desplegar a Firebase Hosting ---
      - name: Compilar web
        run: >
          flutter build web --release
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPICY_ADMIN_F61A1 }}
          channelId: live
          projectId: spicy-admin-f61a1
          entryPoint: frontend