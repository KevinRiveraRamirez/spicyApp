name: spicy_admin
description: "SPICY Streetwear Co. — App de administración (inventario, compras, ventas, finanzas)"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend / datos
  supabase_flutter: ^2.5.6

  # Estado
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.19.0

  # Seguridad
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3

  # Utilidades
  uuid: ^4.4.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/spicy_logo_white.png